{% extends 'base.html' %}

{% block title %}Homepage{% endblock %}

{% block content %}
    <div class="container mt-4">
        <h1>Welcome to Netflex!</h1><br>
        <h2 id="popular">5 most popular bodybuilders of the week:</h2>

        <div class="row justify-content-center mt-4">
            <form class="d-flex col-12 col-md-6 col-lg-4" role="search"  method="GET" action="{{ url_for('items') }}">
                <input class="form-control me-2" name="name" type="search" placeholder="Search" aria-label="Search"/>
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
        </div>
    </div>
{% endblock %}
