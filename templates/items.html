{% extends 'base.html' %}

{% block title %}Items{% endblock %}

{% block content %}
    <div class="container mt-4">
        <div class="row justify-content-center mt-4">
            <form class="d-flex col-12 col-md-6 col-lg-4" role="search" id="search-form" method="GET" action="{{ url_for('items') }}" onsubmit="event.preventDefault(); search();">
                <input class="form-control me-2" id="search-input" name="name" type="search" placeholder="Search" aria-label="Search"/>
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
        </div>
    </div>
{% endblock %}
